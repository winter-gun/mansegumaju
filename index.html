<title>만세구마쥬키우기</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0;width:100%;position:fixed;inset:0;overflow:hidden;overscroll-behavior:none;
  background:#f7f2e8;color:#6f6355;
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:manipulation;
}
#app{position:fixed;inset:0;overflow:hidden}

/* ── 고구마 호흡 레이어 ─────────────────────────── */
#breathOuter{
  position:absolute;left:50%;top:36%;width:min(34vmin,210px);
  transform:translate(-50%,-50%);pointer-events:none;z-index:1;
}
#breathInner{position:relative;will-change:transform}
#breathInner svg{display:block;width:100%;height:auto;position:relative}
#halo{
  position:absolute;inset:-16%;border-radius:50%;
  background:radial-gradient(closest-side,rgba(233,203,168,.5),rgba(233,203,168,0) 72%);
  opacity:.5;
}
#cue{
  position:absolute;top:calc(100% + 30px);left:50%;transform:translateX(-50%);
  white-space:nowrap;font-size:15px;letter-spacing:.02em;color:#b1a390;
  opacity:0;transition:opacity .45s ease;
}

/* ── 낙서 캔버스 (main + 진행 중 스트로크용 live) ── */
#draw{position:absolute;inset:0;z-index:2;touch-action:none;cursor:crosshair}
#live{position:absolute;inset:0;z-index:3;pointer-events:none}

/* ── 툴바 ──────────────────────────────────────── */
#toolbar{
  position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 14px);
  transform:translateX(-50%);z-index:4;
  display:flex;align-items:center;justify-content:center;flex-wrap:wrap;
  gap:6px;row-gap:8px;padding:10px 14px;border-radius:26px;
  background:rgba(255,252,244,.85);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border:1px solid rgba(122,101,79,.12);box-shadow:0 6px 24px rgba(122,101,79,.14);
  max-width:calc(100vw - 20px);
}
.swatch{
  width:29px;height:29px;border-radius:50%;padding:0;cursor:pointer;flex:0 0 auto;
  border:2px solid rgba(255,255,255,.9);box-shadow:0 0 0 1px rgba(122,101,79,.18);
}
.swatch.on{box-shadow:0 0 0 2.5px #b99a86}
.sep{width:1px;height:22px;background:rgba(122,101,79,.16);margin:0 3px;flex:0 0 auto}
.tool{
  width:34px;height:34px;border-radius:50%;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;
  border:1px solid transparent;background:transparent;color:#6f6355;cursor:pointer;padding:0;
}
.tool svg{width:19px;height:19px;display:block}
.tool.on{background:#efe3d3;border-color:rgba(122,101,79,.25)}
.tool.dim{opacity:.35}
#sizeDot{border-radius:50%;background:#6f6355;display:block}
.tbtn{
  border:1px solid rgba(122,101,79,.16);background:rgba(255,255,255,.85);color:#6f6355;
  font-size:14px;font-family:inherit;padding:8px 13px;border-radius:999px;cursor:pointer;
  white-space:nowrap;flex:0 0 auto;
}
.tbtn:active,.tool:active{transform:scale(.96)}
.tbtn:focus-visible,.swatch:focus-visible,.tool:focus-visible{outline:2px solid #b99a86;outline-offset:2px}
#clearBtn.armed{background:#f2d9d3;border-color:#dcb3a8;color:#9c6b5f}

/* ── 오버레이(인트로/저장) ───────────────────────── */
.overlay{
  position:absolute;inset:0;z-index:10;background:#f7f2e8;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;text-align:center;padding:24px;
  transition:opacity .65s ease;
}
.overlay.hidden{opacity:0;pointer-events:none}
.photo{
  width:120px;height:120px;border-radius:50%;overflow:hidden;flex:0 0 auto;
  box-shadow:0 8px 28px rgba(122,101,79,.18);background:#efe6d4;
}
.photo img{width:100%;height:100%;object-fit:cover;display:block}
#intro .photo{width:min(46vmin,210px);height:min(46vmin,210px)}
.big{font-size:22px;font-weight:600;color:#7a6b5a;letter-spacing:-.01em}
.small{font-size:14px;color:#b1a390}
#shot{
  max-width:min(78vw,520px);max-height:34vh;border-radius:16px;
  border:6px solid #fff;box-shadow:0 10px 30px rgba(122,101,79,.18);
  -webkit-touch-callout:default;
}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* ── 잠금 화면 ─────────────────────────────────── */
#lockOv{z-index:20}
#lockForm{display:none;flex-direction:column;gap:12px;align-items:center}
#lockForm.show{display:flex}
#lockInput{
  border:1px solid rgba(122,101,79,.25);background:#fff;border-radius:999px;
  padding:11px 20px;font-size:16px;font-family:inherit;color:#6f6355;
  width:min(74vw,300px);text-align:center;outline:none;
  -webkit-user-select:text;user-select:text;
}
#lockInput:focus{border-color:#b99a86}
#lockErr{min-height:18px}

/* ── 리플레이 안내 칩 ─────────────────────────────── */
#replayOv{
  position:absolute;inset:0;z-index:6;
  display:flex;justify-content:center;align-items:flex-start;
  padding-top:calc(env(safe-area-inset-top,0px) + 18px);
}
#replayOv.hidden{display:none}
#replayChip{
  background:rgba(255,252,244,.92);border:1px solid rgba(122,101,79,.15);
  border-radius:999px;padding:9px 18px;font-size:13px;color:#8d7f6d;
  box-shadow:0 6px 20px rgba(122,101,79,.15);
}

/* ── 보관함 ─────────────────────────────────────── */
#galleryGrid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;width:min(92vw,640px);max-height:52vh;overflow-y:auto;padding:4px;
}
.gitem{
  background:rgba(255,255,255,.9);border:1px solid rgba(122,101,79,.12);
  border-radius:14px;padding:8px;box-shadow:0 4px 14px rgba(122,101,79,.08);
}
.gitem img{width:100%;border-radius:10px;display:block;background:#efe6d4}
.gdate{font-size:12px;color:#a3937f;margin:7px 2px 6px;text-align:left}
.gbtns{display:flex;gap:6px}
.gbtn{
  flex:1;border:1px solid rgba(122,101,79,.16);background:#fff;color:#6f6355;
  font-size:12.5px;font-family:inherit;padding:6px 0;border-radius:999px;cursor:pointer;
}
.gbtn.warn{color:#9c6b5f}

/* ── 아롱이 앨범 ───────────────────────────────── */
#petPhoto{
  width:min(66vw,320px);height:min(66vw,320px);object-fit:cover;
  border-radius:18px;border:5px solid #fff;background:#efe6d4;
  box-shadow:0 10px 30px rgba(122,101,79,.18);touch-action:pan-y;
}
.navBtn{
  width:38px;height:38px;border-radius:50%;flex:0 0 auto;cursor:pointer;
  border:1px solid rgba(122,101,79,.16);background:rgba(255,255,255,.85);
  color:#6f6355;font-size:20px;font-family:inherit;line-height:1;
}
.navBtn:active{transform:scale(.95)}
#gStatus{min-height:18px}

@media (prefers-reduced-motion:reduce){
  .overlay{transition:none}
  #cue{transition:none}
}
</style>

<script>
(() => {
'use strict';

let userPhotos = [];  // 직접 추가한 사진 {id, ts, data} — 이 기기 안에만 저장
const photoPool = () => PHOTOS.concat(userPhotos.map(p => p.data));
const pickPhoto = () => { const pool = photoPool(); return pool[(Math.random() * pool.length) | 0] || ''; };

let GREETS = [];
let CHEERS = [];

/* ── 호흡: 4초 들숨 → 2초 멈춤 → 6초 날숨 ───────────── */
const INHALE = 4000, HOLD = 2000, EXHALE = 6000, CYCLE = INHALE + HOLD + EXHALE;
const CUES = ['천천히 들이쉬어요', '잠시 멈추고', '길게 내쉬어요'];
const easeIO = x => .5 - .5 * Math.cos(Math.PI * x);
let t0 = 0, lastPhase = -1, cueTimer = 0;

function frame(now) {
  const m = (now - t0) % CYCLE;
  let s, ph;
  if (m < INHALE)             { s = easeIO(m / INHALE);                        ph = 0; }
  else if (m < INHALE + HOLD) { s = 1;                                         ph = 1; }
  else                        { s = 1 - easeIO((m - INHALE - HOLD) / EXHALE);  ph = 2; }
  breathInner.style.transform = 'scale(' + (1 + .16 * s).toFixed(4) + ')';
  halo.style.opacity = (.45 + .4 * s).toFixed(3);
  if (ph !== lastPhase) {
    lastPhase = ph;
    cue.style.opacity = 0;
    clearTimeout(cueTimer);
    cueTimer = setTimeout(() => { cue.textContent = CUES[ph]; cue.style.opacity = 1; }, 380);
  }
  requestAnimationFrame(frame);
}

/* ── 인트로: 잠시 후 자동 전환, 탭하면 바로 ─────────── */
let introDone = false;
function dismissIntro() {
  if (introDone) return;
  introDone = true;
  intro.classList.add('hidden');
  t0 = performance.now();
  requestAnimationFrame(frame);
  setTimeout(() => intro.remove(), 800);
}
intro.addEventListener('pointerdown', dismissIntro);
// 인트로 자동 전환 타이머는 잠금 해제 후에 시작됨 (unlockSuccess)

/* ── 상태 ──────────────────────────────────────── */
const LS_KEY = 'mansegumaju.v1';
const SIZES = [.6, 1, 1.9];
const strokes = [];
let cur = null, activeId = null, lastPenTs = -1e9;
let dpr = 1, vw = 0, vh = 0;
let color = document.querySelector('.swatch.on').dataset.color;
let tool = 'p', lastDrawTool = 'p', sizeIdx = 1;
let pendingRestore = true;
let dirtySinceArchive = false;  // 마지막 보관함 저장 이후 그림이 바뀌었는지

const baseW = () => 4.5 * SIZES[sizeIdx];
const markerW = () => baseW() * 2.6;
const eraserW = () => baseW() * 3.2;
const stampU = () => 9 * SIZES[sizeIdx];
const wcBase = () => baseW() * 2.4;

/* ── 캔버스 크기 ───────────────────────────────── */
function setupCtx(c) {
  c.setTransform(dpr, 0, 0, dpr, 0, 0);
  c.lineCap = 'round'; c.lineJoin = 'round';
}
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  if (!(w > 0 && h > 0)) return;
  endReplay();
  dpr = Math.min(window.devicePixelRatio || 1, 3);
  vw = w; vh = h;
  for (const cv of [canvas, live]) {
    cv.width = Math.round(vw * dpr);
    cv.height = Math.round(vh * dpr);
    cv.style.width = vw + 'px';
    cv.style.height = vh + 'px';
  }
  setupCtx(mctx); setupCtx(lctx);
  if (pendingRestore) { pendingRestore = false; restoreSaved(); }
  redrawAll();
}

/* ── 그리기 프리미티브 ──────────────────────────── */
function dot(c, x, y, w, col) {
  c.fillStyle = col;
  c.beginPath(); c.arc(x, y, w / 2, 0, Math.PI * 2); c.fill();
}
function seg(c, st, i) {
  const pts = st.pts, p0 = pts[i - 2] || pts[i - 1], p1 = pts[i - 1], p2 = pts[i];
  c.strokeStyle = st.c;
  c.lineWidth = (p1.w + p2.w) / 2;
  c.beginPath();
  c.moveTo((p0.x + p1.x) / 2, (p0.y + p1.y) / 2);
  c.quadraticCurveTo(p1.x, p1.y, (p1.x + p2.x) / 2, (p1.y + p2.y) / 2);
  c.stroke();
}
function buildPath(c, pts) {
  c.beginPath();
  c.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    c.quadraticCurveTo(pts[i].x, pts[i].y, (pts[i].x + pts[i + 1].x) / 2, (pts[i].y + pts[i + 1].y) / 2);
  }
  if (pts.length > 1) c.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
}
function paw(c, x, y, u, rot, col) {
  c.save();
  c.translate(x, y); c.rotate(rot);
  c.fillStyle = col;
  c.beginPath(); c.ellipse(0, u * .45, u * .95, u * .75, 0, 0, Math.PI * 2); c.fill();
  const toes = [[-u * 1.05, -u * .15, u * .38], [-u * .38, -u * .62, u * .4], [u * .38, -u * .62, u * .4], [u * 1.05, -u * .15, u * .38]];
  for (const [tx, ty, tr] of toes) {
    c.beginPath(); c.arc(tx, ty, tr, 0, Math.PI * 2); c.fill();
  }
  c.restore();
}
function drawMarker(c, st) {
  c.save();
  c.globalAlpha = .45;
  c.strokeStyle = st.c; c.fillStyle = st.c; c.lineWidth = st.w;
  c.lineCap = 'round'; c.lineJoin = 'round';
  if (st.pts.length === 1) {
    c.beginPath(); c.arc(st.pts[0].x, st.pts[0].y, st.w / 2, 0, Math.PI * 2); c.fill();
  } else {
    buildPath(c, st.pts); c.stroke();
  }
  c.restore();
}
function hexRgb(h) {
  return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
}
function wcStamp(c, x, y, r, col) {
  const [R, G, B] = hexRgb(col);
  const g = c.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, 'rgba(' + R + ',' + G + ',' + B + ',0.12)');
  g.addColorStop(.7, 'rgba(' + R + ',' + G + ',' + B + ',0.06)');
  g.addColorStop(1, 'rgba(' + R + ',' + G + ',' + B + ',0)');
  c.fillStyle = g;
  c.beginPath(); c.arc(x, y, r, 0, Math.PI * 2); c.fill();
}
function wcSegment(c, st, i) {
  const a = st.pts[i - 1], b = st.pts[i];
  const dist = Math.hypot(b.x - a.x, b.y - a.y);
  const n = Math.max(1, Math.floor(dist / Math.max(1.5, b.r * .3)));
  for (let k = 1; k <= n; k++) {
    const t = k / n;
    wcStamp(c, a.x + (b.x - a.x) * t, a.y + (b.y - a.y) * t, a.r + (b.r - a.r) * t, st.c);
  }
}
function drawErase(c, st) {
  c.save();
  c.globalCompositeOperation = 'destination-out';
  c.strokeStyle = '#000'; c.fillStyle = '#000'; c.lineWidth = st.w;
  c.lineCap = 'round'; c.lineJoin = 'round';
  if (st.pts.length === 1) {
    c.beginPath(); c.arc(st.pts[0].x, st.pts[0].y, st.w / 2, 0, Math.PI * 2); c.fill();
  } else {
    buildPath(c, st.pts); c.stroke();
  }
  c.restore();
}
function replay(c, st) {
  if (st.t === 'p') {
    dot(c, st.pts[0].x, st.pts[0].y, st.pts[0].w, st.c);
    for (let i = 1; i < st.pts.length; i++) seg(c, st, i);
  } else if (st.t === 'm') {
    drawMarker(c, st);
  } else if (st.t === 'w') {
    wcStamp(c, st.pts[0].x, st.pts[0].y, st.pts[0].r, st.c);
    for (let i = 1; i < st.pts.length; i++) wcSegment(c, st, i);
  } else if (st.t === 'e') {
    drawErase(c, st);
  } else if (st.t === 's') {
    for (const p of st.pts) paw(c, p.x, p.y, st.u, p.r, st.c);
  }
}
function redrawAll() {
  mctx.clearRect(0, 0, vw, vh);
  for (const st of strokes) replay(mctx, st);
}
function drawMarkerLive() {
  lctx.clearRect(0, 0, vw, vh);
  drawMarker(lctx, cur);
}
function compositeLive() {
  mctx.save();
  mctx.setTransform(1, 0, 0, 1, 0, 0);
  mctx.drawImage(live, 0, 0);
  mctx.restore();
  lctx.clearRect(0, 0, vw, vh);
}

/* ── 포인터 입력 ───────────────────────────────── */
function pressOf(e) {
  const p = (e.pointerType === 'pen' && e.pressure > 0) ? e.pressure : .5;
  return Math.min(Math.max(p, .05), 1);
}
function penW(e) { return baseW() * (.35 + 1.5 * pressOf(e)); }
function wcR(e) { return wcBase() * (.55 + .9 * pressOf(e)); }

canvas.addEventListener('pointerdown', e => {
  if (e.pointerType === 'pen') lastPenTs = e.timeStamp;
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  if (activeId !== null) return;
  // 펜 사용 직후의 손바닥 터치는 무시
  if (e.pointerType === 'touch' && e.timeStamp - lastPenTs < 1500) return;
  e.preventDefault();
  activeId = e.pointerId;
  try { canvas.setPointerCapture(activeId); } catch (_) {}
  const x = e.clientX, y = e.clientY;
  if (tool === 'p') {
    const w = penW(e);
    cur = { t: 'p', c: color, pts: [{ x, y, w }] };
    dot(lctx, x, y, w, color);
  } else if (tool === 'm') {
    cur = { t: 'm', c: color, w: markerW(), pts: [{ x, y }] };
    drawMarkerLive();
  } else if (tool === 'w') {
    const r = wcR(e);
    cur = { t: 'w', c: color, pts: [{ x, y, r }] };
    wcStamp(lctx, x, y, r, color);
  } else if (tool === 's') {
    cur = { t: 's', c: color, u: stampU(), pts: [{ x, y, r: Math.random() * .55 - .275 }] };
    paw(mctx, x, y, cur.u, cur.pts[0].r, color);
  } else {
    cur = { t: 'e', w: eraserW(), pts: [{ x, y }] };
    drawErase(mctx, { t: 'e', w: cur.w, pts: [{ x, y }] });
  }
  strokes.push(cur);
});

canvas.addEventListener('pointermove', e => {
  if (e.pointerId !== activeId || !cur) return;
  if (e.pointerType === 'pen') lastPenTs = e.timeStamp;
  let evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [];
  if (!evs.length) evs = [e];
  let markerDirty = false;
  for (const ev of evs) {
    const x = ev.clientX, y = ev.clientY;
    const prev = cur.pts[cur.pts.length - 1];
    if (cur.t === 'p') {
      if (Math.hypot(x - prev.x, y - prev.y) < .7) continue;
      const w = prev.w + (penW(ev) - prev.w) * .3;
      cur.pts.push({ x, y, w });
      seg(lctx, cur, cur.pts.length - 1);
    } else if (cur.t === 'm') {
      if (Math.hypot(x - prev.x, y - prev.y) < 1.2) continue;
      cur.pts.push({ x, y });
      markerDirty = true;
    } else if (cur.t === 'w') {
      if (Math.hypot(x - prev.x, y - prev.y) < 2) continue;
      const r = prev.r + (wcR(ev) - prev.r) * .3;
      cur.pts.push({ x, y, r });
      wcSegment(lctx, cur, cur.pts.length - 1);
    } else if (cur.t === 's') {
      if (cur.pts.length >= 400) continue;
      if (Math.hypot(x - prev.x, y - prev.y) < cur.u * 3.4) continue;
      const r = Math.random() * .55 - .275;
      cur.pts.push({ x, y, r });
      paw(mctx, x, y, cur.u, r, cur.c);
    } else {
      if (Math.hypot(x - prev.x, y - prev.y) < 1) continue;
      cur.pts.push({ x, y });
      mctx.save();
      mctx.globalCompositeOperation = 'destination-out';
      mctx.strokeStyle = '#000'; mctx.lineWidth = cur.w;
      mctx.lineCap = 'round';
      mctx.beginPath(); mctx.moveTo(prev.x, prev.y); mctx.lineTo(x, y); mctx.stroke();
      mctx.restore();
    }
  }
  if (markerDirty) drawMarkerLive();
});

function finishCurrent() {
  if (!cur) return;
  if (cur.t === 'p' || cur.t === 'm' || cur.t === 'w') compositeLive();
  cur = null; activeId = null;
  dirtySinceArchive = true;
  refreshUndo();
  scheduleSave();
}
function endStroke(e) {
  if (e.pointerId !== activeId) return;
  finishCurrent();
}
canvas.addEventListener('pointerup', endStroke);
canvas.addEventListener('pointercancel', endStroke);
canvas.addEventListener('contextmenu', e => e.preventDefault());

/* ── 팔레트 / 도구 / 굵기 / 되돌리기 ─────────────── */
document.querySelectorAll('.swatch').forEach(b => b.addEventListener('click', () => {
  const on = document.querySelector('.swatch.on');

  b.classList.add('on');

  scheduleSave();
}));

function setTool(t) {
  tool = t;
  if (t !== 'e') lastDrawTool = t;
  document.querySelectorAll('.tool[data-tool]').forEach(b =>
    b.classList.toggle('on', b.dataset.tool === t));

function refreshSizeDot() {

  sizeDot.style.height = d + 'px';
}
sizeBtn.addEventListener('click', () => {

refreshSizeDot();

function refreshUndo() {
  const empty = strokes.length === 0;
  undoBtn.classList.toggle('dim', empty);
  replayBtn.classList.toggle('dim', empty);
}
undoBtn.addEventListener('click', () => {

  dirtySinceArchive = true;

/* ── 지우기(전체): 두 번 눌러 확인 ─────────────────── */
let armed = false, armTimer = 0;
function disarm() {
  armed = false;
  clearBtn.classList.remove('armed');
  clearBtn.textContent = '지우기';
}
clearBtn.addEventListener('click', () => {
  if (!armed) {
    armed = true;

  redrawAll();

});

/* ── 타임랩스 리플레이: 그렸던 순서대로 다시 보기 ──── */
let rp = null;

function renderReplayPoint(st, k) {
  if (st.t === 'p') {
    if (k === 0) dot(lctx, st.pts[0].x, st.pts[0].y, st.pts[0].w, st.c);
    else seg(lctx, st, k);
  } else if (st.t === 'w') {
    if (k === 0) wcStamp(lctx, st.pts[0].x, st.pts[0].y, st.pts[0].r, st.c);
    else wcSegment(lctx, st, k);
  } else if (st.t === 's') {
    const p = st.pts[k];
    paw(mctx, p.x, p.y, st.u, p.r, st.c);
  } else if (st.t === 'e') {
    mctx.save();
    mctx.globalCompositeOperation = 'destination-out';
    mctx.strokeStyle = '#000'; mctx.fillStyle = '#000';
    mctx.lineWidth = st.w; mctx.lineCap = 'round';
    if (k === 0) {
      mctx.beginPath(); mctx.arc(st.pts[0].x, st.pts[0].y, st.w / 2, 0, Math.PI * 2); mctx.fill();
    } else {
      const a = st.pts[k - 1], b = st.pts[k];
      mctx.beginPath(); mctx.moveTo(a.x, a.y); mctx.lineTo(b.x, b.y); mctx.stroke();
    }
    mctx.restore();
  }
  // 'm'(마커)은 반투명 누적을 피하려고 stepReplay에서 프레임 단위로 그림
}

function stepReplay() {
  if (!rp) return;
  let n = rp.per;
  while (n > 0 && rp.i < rp.list.length) {
    const st = rp.list[rp.i];
    renderReplayPoint(st, rp.j);
    rp.j++; n--;
    if (rp.j >= st.pts.length) {
      if (st.t === 'm') { lctx.clearRect(0, 0, vw, vh); drawMarker(lctx, st); }
      if (st.t === 'p' || st.t === 'm' || st.t === 'w') compositeLive();
      rp.i++; rp.j = 0;
    }
  }
  const cs = rp.list[rp.i];
  if (cs && cs.t === 'm' && rp.j > 0) {
    lctx.clearRect(0, 0, vw, vh);
    drawMarker(lctx, { t: 'm', c: cs.c, w: cs.w, pts: cs.pts.slice(0, rp.j) });
  }
  if (rp.i >= rp.list.length) { endReplay(); return; }
  rp.raf = requestAnimationFrame(stepReplay);
}

function startReplay(list) {
  const L = (Array.isArray(list) && list.length) ? list : strokes;
  if (rp || !L.length) return;
  finishCurrent();
  const total = L.reduce((s, st) => s + st.pts.length, 0);
  const dur = Math.min(15000, Math.max(4000, total * 8));
  rp = { list: L, i: 0, j: 0, per: Math.max(1, Math.round(total / (dur / 16.7))), raf: 0 };
  replayOv.classList.remove('hidden');
  mctx.clearRect(0, 0, vw, vh);
  lctx.clearRect(0, 0, vw, vh);
  rp.raf = requestAnimationFrame(stepReplay);
}

function endReplay() {
  if (!rp) return;
  cancelAnimationFrame(rp.raf);
  rp = null;
  lctx.clearRect(0, 0, vw, vh);
  redrawAll();
  replayOv.classList.add('hidden');
}
replayBtn.addEventListener('click', () => startReplay());
replayOv.addEventListener('pointerdown', endReplay);

/* ── 보관함: 저장한 그림을 획 데이터째 보관, 타임랩스 재생 ── */
function dbOpen() {
  return new Promise((res, rej) => {
    const q = indexedDB.open('mansegumaju-db', 3);
    q.onupgradeneeded = () => {
      const db = q.result;
      if (!db.objectStoreNames.contains('works')) db.createObjectStore('works', { keyPath: 'id', autoIncrement: true });
      if (!db.objectStoreNames.contains('photos')) db.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
      if (!db.objectStoreNames.contains('state')) db.createObjectStore('state', { keyPath: 'k' });
    };
    q.onsuccess = () => res(q.result);
    q.onerror = () => rej(q.error);
  });
}
async function dbAdd(entry, store) {
  store = store || 'works';
  const db = await dbOpen();
  try {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).add(entry);
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = () => rej(tx.error); });
  } finally { db.close(); }
}
async function dbAll(store) {
  store = store || 'works';
  const db = await dbOpen();
  try {
    const rq = db.transaction(store).objectStore(store).getAll();
    return await new Promise((res, rej) => { rq.onsuccess = () => res(rq.result || []); rq.onerror = () => rej(rq.error); });
  } finally { db.close(); }
}
async function dbDel(id, store) {
  store = store || 'works';
  const db = await dbOpen();
  try {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(id);
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = () => rej(tx.error); });
  } finally { db.close(); }
}
async function dbPut(entry, store) {
  const db = await dbOpen();
  try {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(entry);
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = () => rej(tx.error); });
  } finally { db.close(); }
}
async function dbGet(key, store) {
  const db = await dbOpen();
  try {
    const rq = db.transaction(store).objectStore(store).get(key);
    return await new Promise((res, rej) => { rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error); });
  } finally { db.close(); }
}

function fitStrokes(list, sw, sh) {
  const out = JSON.parse(JSON.stringify(list));
  const sc = (sw > 0 && sh > 0) ? Math.min(vw / sw, vh / sh) : 1;
  const dx = (sw > 0) ? (vw - sw * sc) / 2 : 0;
  const dy = (sh > 0) ? (vh - sh * sc) / 2 : 0;
  for (const st of out) {
    for (const p of st.pts) {
      p.x = p.x * sc + dx;
      p.y = p.y * sc + dy;
      if (p.w) p.w = Math.max(.5, p.w * sc);
      if (st.t === 'w' && p.r) p.r = Math.max(.5, p.r * sc);
    }
    if (st.w) st.w = Math.max(.5, st.w * sc);
    if (st.u) st.u = Math.max(1, st.u * sc);
  }
  return out;
}
async function thumbFromCanvas() {
  const tw = 260, th = Math.max(1, Math.round(tw * vh / vw));
  const cv = document.createElement('canvas');
  cv.width = tw; cv.height = th;
  const c2 = cv.getContext('2d');
  c2.fillStyle = '#f7f2e8';
  c2.fillRect(0, 0, tw, th);
  try {
    const img = await svgImg();
    const r = breathOuter.getBoundingClientRect();
    const k = tw / vw;
    c2.drawImage(img, r.left * k, r.top * k, r.width * k, r.height * k);
  } catch (_) {}
  c2.drawImage(canvas, 0, 0, tw, th);
  return cv.toDataURL('image/jpeg', .72);
}
async function archiveCurrent() {
  if (!strokes.length) return;
  let thumb = '';
  try { thumb = await thumbFromCanvas(); } catch (_) {}
  await dbAdd({ ts: Date.now(), w: vw, h: vh, strokes: JSON.parse(JSON.stringify(strokes)), thumb });
  dirtySinceArchive = false;
}
async function loadWork(wk) {
  finishCurrent();
  // 지금 그리던 그림 보호: 바뀐 내용이 있으면 먼저 보관함에 넣어둠
  if (strokes.length && dirtySinceArchive) {
    try { await archiveCurrent(); } catch (_) {}
  }
  const fitted = fitStrokes(wk.strokes, wk.w, wk.h);
  strokes.length = 0;
  Array.prototype.push.apply(strokes, fitted);
  dirtySinceArchive = false;
  redrawAll();
  refreshUndo();
  scheduleSave();
  galleryOv.classList.add('hidden');
}
function fmtDate(ts) {
  const d = new Date(ts), z = n => String(n).padStart(2, '0');
  return (d.getMonth() + 1) + '월 ' + d.getDate() + '일 ' + z(d.getHours()) + ':' + z(d.getMinutes());
}
async function openGallery() {
  galleryGrid.innerHTML = '';
  let works = [];
  try { works = await dbAll(); } catch (_) {}
  works.sort((a, b) => b.ts - a.ts);
  if (!works.length) {
    const p = document.createElement('div');
    p.className = 'small';
    p.style.cssText = 'grid-column:1/-1;padding:28px 0';
    p.textContent = '아직 비어 있어요. 저장하기를 누르면 여기에 차곡차곡 쌓여요.';
    galleryGrid.appendChild(p);
  }
  for (const wk of works) {
    const it = document.createElement('div'); it.className = 'gitem';
    const im = document.createElement('img');
    im.src = wk.thumb || ''; im.alt = '저장한 그림'; im.draggable = false;

    const bs = document.createElement('div'); bs.className = 'gbtns';

    bPlay.addEventListener('click', () => {

}
function backupInfoText() {

/* ── 보관함 백업: 파일로 내보내기 / 가져오기 ──────── */
exportBtn.addEventListener('click', async () => {
  try {
    const works = await dbAll('works');
    const photos = await dbAll('photos');
    const blob = new Blob(
      [JSON.stringify({ app: 'mansegumaju', v: 1, exportedAt: Date.now(), works, photos })],
      { type: 'application/json' });
    const d = new Date(), z = n => String(n).padStart(2, '0');
    const fname = '아롱이보관함_' + d.getFullYear() + '-' + z(d.getMonth() + 1) + '-' + z(d.getDate()) + '.json';
    // 터치 기기에서는 공유 창으로 바로 (카톡 나에게 보내기 등), 그 외엔 파일 다운로드
    let handled = false;
    const touch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (touch && navigator.canShare) {
      try {
        const file = new File([blob], fname, { type: 'application/json' });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file] });
          handled = true;
        }
      } catch (e) {
        if (e && e.name === 'AbortError') { gStatus.textContent = '내보내기를 취소했어요'; return; }
      }
    }
    if (!handled) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fname;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }
    try { localStorage.setItem('mansegumaju.lastBackup', String(Date.now())); } catch (_) {}
    gStatus.textContent = '그림 ' + works.length + '장, 사진 ' + photos.length + '장을 내보냈어요';
  } catch (_) {
    gStatus.textContent = '내보내기에 실패했어요. 다시 시도해 주세요';
  }
});
importBtn.addEventListener('click', () => importInput.click());
importInput.addEventListener('change', async () => {
  const f = importInput.files && importInput.files[0];
  importInput.value = '';
  if (!f) return;
  try {
    const d = JSON.parse(await f.text());
    if (!d || d.app !== 'mansegumaju') {
      gStatus.textContent = '만세구마쥬 백업 파일이 아니에요';
      return;
    }
    const haveW = new Set((await dbAll('works')).map(w => w.ts));
    const haveP = new Set((await dbAll('photos')).map(p => p.ts));
    let nw = 0, np = 0;
    for (const w of (Array.isArray(d.works) ? d.works : [])) {
      if (!w || !Array.isArray(w.strokes) || haveW.has(w.ts)) continue;
      delete w.id;
      await dbAdd(w, 'works'); nw++;
    }
    for (const p of (Array.isArray(d.photos) ? d.photos : [])) {
      if (!p || typeof p.data !== 'string' || haveP.has(p.ts)) continue;
      delete p.id;
      await dbAdd(p, 'photos'); np++;
    }
    await loadUserPhotos();
    await openGallery();
    gStatus.textContent = '그림 ' + nw + '장, 사진 ' + np + '장을 가져왔어요';
  } catch (_) {
    gStatus.textContent = '가져오기에 실패했어요. 파일을 확인해 주세요';
  }
});

/* ── 아롱이 앨범: 넘겨보기 + 사진 직접 추가 ────────── */
async function loadUserPhotos() {
  try { userPhotos = (await dbAll('photos')).sort((a, b) => a.ts - b.ts); } catch (_) { userPhotos = []; }
}
let petIdx = 0, petDelArmed = false, petSwipeX = null;
function petRender() {
  const pool = photoPool();
  if (!pool.length) return;
  petIdx = ((petIdx % pool.length) + pool.length) % pool.length;
  petPhoto.src = pool[petIdx];
  petCount.textContent = (petIdx + 1) + ' / ' + pool.length + ' · 옆으로 밀어 넘겨요';
  petDelBtn.hidden = petIdx < PHOTOS.length;  // 직접 추가한 사진만 지울 수 있음
  petDelBtn.textContent = '이 사진 지우기';
  petDelArmed = false;
}
petAlbumBtn.addEventListener('click', () => { petRender(); petOv.classList.remove('hidden'); });
petClose.addEventListener('click', () => petOv.classList.add('hidden'));
petPrev.addEventListener('click', () => { petIdx--; petRender(); });
petNext.addEventListener('click', () => { petIdx++; petRender(); });
petPhoto.addEventListener('pointerdown', e => { petSwipeX = e.clientX; });
petPhoto.addEventListener('pointerup', e => {
  if (petSwipeX === null) return;
  const dx = e.clientX - petSwipeX;
  petSwipeX = null;
  if (dx > 40) { petIdx--; petRender(); }
  else if (dx < -40) { petIdx++; petRender(); }
});
function fileToSquare(file) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const i = new Image();
    i.onload = () => {
      try {
        const s = Math.min(i.naturalWidth, i.naturalHeight);
        const cv = document.createElement('canvas');
        cv.width = 480; cv.height = 480;
        cv.getContext('2d').drawImage(i, (i.naturalWidth - s) / 2, (i.naturalHeight - s) / 2, s, s, 0, 0, 480, 480);
        URL.revokeObjectURL(url);
        res(cv.toDataURL('image/jpeg', .8));
      } catch (e) { URL.revokeObjectURL(url); rej(e); }
    };
    i.onerror = () => { URL.revokeObjectURL(url); rej(new Error('이미지 로드 실패')); };
    i.src = url;
  });
}
petAddBtn.addEventListener('click', () => photoInput.click());
photoInput.addEventListener('change', async () => {
  const files = Array.prototype.slice.call(photoInput.files || [], 0, 20);
  photoInput.value = '';
  let added = 0;
  for (const f of files) {
    try {
      const data = await fileToSquare(f);
      await dbAdd({ ts: Date.now() + added, data }, 'photos');
      added++;
    } catch (_) {}
  }
  if (added) {
    await loadUserPhotos();
    petIdx = PHOTOS.length + userPhotos.length - 1;
    petRender();
  }
});
petDelBtn.addEventListener('click', async () => {
  if (petIdx < PHOTOS.length) return;
  if (!petDelArmed) {
    petDelArmed = true;
    petDelBtn.textContent = '한 번 더 누르면 지워져요';
    setTimeout(() => { petDelArmed = false; if (!petDelBtn.hidden) petDelBtn.textContent = '이 사진 지우기'; }, 2500);
    return;
  }
  const p = userPhotos[petIdx - PHOTOS.length];
  if (p) { try { await dbDel(p.id, 'photos'); } catch (_) {} }
  await loadUserPhotos();
  petRender();
});
loadUserPhotos();

/* ── 자동 저장/복원 (localStorage, 이 기기 안에서만) ── */
let saveT = 0;
function scheduleSave() { clearTimeout(saveT); saveT = setTimeout(persist, 600); }
function persist() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({ v: 1, w: vw, h: vh, color, sizeIdx, strokes }));
  } catch (_) {
    try {
      if (strokes.length > 20) {
        const t = strokes.slice(Math.floor(strokes.length / 4));
        localStorage.setItem(LS_KEY, JSON.stringify({ v: 1, w: vw, h: vh, color, sizeIdx, strokes: t }));
      }
    } catch (_) {}
  }
  // 이중 저장: 더 튼튼한 공간(IndexedDB)에도 복사본을 둠
  dbPut({ k: 'current', v: 1, w: vw, h: vh, color, sizeIdx, strokes }, 'state').catch(() => {});
}
window.addEventListener('pagehide', persist);

function restoreSaved() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw && applyRestore(JSON.parse(raw))) return;
  } catch (_) {}
  restoreFromDbFallback();  // 1차 저장본이 없거나 깨졌으면 복사본에서 복원
}
async function restoreFromDbFallback() {
  try {
    const d = await dbGet('current', 'state');
    if (strokes.length || cur) return;  // 그 사이 그리기 시작했으면 건드리지 않음
    if (applyRestore(d)) redrawAll();
  } catch (_) {}
}
function applyRestore(d) {
  try {
    if (!d || !Array.isArray(d.strokes)) return false;
    const sc = (d.w > 0 && d.h > 0) ? Math.min(vw / d.w, vh / d.h) : 1;
    const dx = (d.w > 0) ? (vw - d.w * sc) / 2 : 0;
    const dy = (d.h > 0) ? (vh - d.h * sc) / 2 : 0;
    for (const st of d.strokes) {
      if (!st || !Array.isArray(st.pts) || !st.pts.length) continue;
      for (const p of st.pts) {
        p.x = p.x * sc + dx;
        p.y = p.y * sc + dy;
        if (p.w) p.w = Math.max(.5, p.w * sc);
        if (st.t === 'w' && p.r) p.r = Math.max(.5, p.r * sc);  // 's'의 r은 회전각이라 그대로 둠
      }
      if (st.w) st.w = Math.max(.5, st.w * sc);
      if (st.u) st.u = Math.max(1, st.u * sc);
      strokes.push(st);
      dirtySinceArchive = true;
    }
    const sw = document.querySelector('.swatch[data-color="' + d.color + '"]');
    if (sw) {
      const on = document.querySelector('.swatch.on');
      if (on) on.classList.remove('on');
      sw.classList.add('on');
      color = d.color;
    }
    if (Number.isInteger(d.sizeIdx) && d.sizeIdx >= 0 && d.sizeIdx < SIZES.length) {
      sizeIdx = d.sizeIdx;
      refreshSizeDot();
    }
    refreshUndo();
    return true;
  } catch (_) { return false; }
}

/* ── 저장: 배경+고구마+낙서 → PNG ─────────────────── */
let shotUrl = null, shotBlob = null;

function svgImg() {
  return new Promise((res, rej) => {
    const s = new XMLSerializer().serializeToString($('gogumaSvg'));
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = rej;
    i.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(s);
  });
}
async function capture() {
  finishCurrent();
  const off = document.createElement('canvas');
  off.width = canvas.width; off.height = canvas.height;
  const c = off.getContext('2d');
  c.fillStyle = '#f7f2e8';
  c.fillRect(0, 0, off.width, off.height);
  try {
    const img = await svgImg();
    const r = breathOuter.getBoundingClientRect();
    c.drawImage(img, r.left * dpr, r.top * dpr, r.width * dpr, r.height * dpr);
  } catch (_) { /* 고구마 렌더 실패 시 낙서만 저장 */ }
  c.drawImage(canvas, 0, 0);
  return new Promise((res, rej) => off.toBlob(b => b ? res(b) : rej(new Error('toBlob 실패')), 'image/png'));
}
function fileName() {
  const d = new Date(), z = n => String(n).padStart(2, '0');
  return 'mansegumaju_' + d.getFullYear() + '-' + z(d.getMonth() + 1) + '-' + z(d.getDate())
       + '_' + z(d.getHours()) + z(d.getMinutes()) + '.png';
}
function canShareFile() {
  if (!navigator.canShare || !shotBlob) return false;
  try {
    return navigator.canShare({ files: [new File([shotBlob], 'm.png', { type: 'image/png' })] });
  } catch (_) { return false; }
}

saveBtn.addEventListener('click', async () => {

async function acquireLock() {

/* ── 잠금 해제: 사진·문구는 암호(VAULT)로 잠겨 있음 ── */
const VK_KEY = 'mansegumaju.vk';
function b64buf(s) {
  const b = atob(s), a = new Uint8Array(b.length);
  for (let i = 0; i < b.length; i++) a[i] = b.charCodeAt(i);
  return a;
}
function bufB64(a) {
  let s = '';
  const u = new Uint8Array(a);
  for (let i = 0; i < u.length; i++) s += String.fromCharCode(u[i]);
  return btoa(s);
}
async function vaultDecrypt(rawKey) {
  const key = await crypto.subtle.importKey('raw', rawKey, 'AES-GCM', false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64buf(VAULT.iv) }, key, b64buf(VAULT.data));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function keyFromPass(pass) {
  const mat = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', hash: 'SHA-256', salt: b64buf(VAULT.salt), iterations: VAULT.n }, mat, 256);
  return new Uint8Array(bits);
}
function unlockSuccess(p) {
  PHOTOS = Array.isArray(p.photos) ? p.photos : [];
  CHEERS = Array.isArray(p.cheers) ? p.cheers : [['잘했어요', '']];
  GREETS = Array.isArray(p.greets) ? p.greets : ['잠깐 쉬어가자'];
  $('introPhoto').src = pickPhoto();
  $('introMain').textContent = GREETS[(Math.random() * GREETS.length) | 0];
  lockOv.classList.add('hidden');
  setTimeout(dismissIntro, 1900);
}
async function submitPass() {
  const v = (lockInput.value || '').trim().normalize('NFC');
  if (!v) return;
  lockBtn.disabled = true;
  lockErr.textContent = '여는 중…';
  try {
    const raw = await keyFromPass(v);
    const p = await vaultDecrypt(raw);
    try { localStorage.setItem(VK_KEY, bufB64(raw)); } catch (_) {}
    lockErr.textContent = '';
    unlockSuccess(p);
  } catch (_) {
    lockErr.textContent = '암호가 맞지 않아요 · 천천히 다시 한번요';
    lockInput.select();
  }
  lockBtn.disabled = false;
}
lockBtn.addEventListener('click', submitPass);
lockInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitPass(); });
(async function boot() {
  if (!VAULT) {  // 빌드 전 상태 방어
    lockErr.textContent = '잠금 데이터가 없어요';
    return;
  }
  try {
    const s = localStorage.getItem(VK_KEY);
    if (s) {
      unlockSuccess(await vaultDecrypt(b64buf(s)));
      return;
    }
  } catch (_) { /* 저장된 열쇠가 안 맞으면 입력으로 */ }
  lockForm.classList.add('show');
  lockInput.focus();
})();
})();
